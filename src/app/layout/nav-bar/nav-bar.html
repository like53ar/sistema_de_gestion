<nav class="navbar">
    <div class="logo">
        <h1>Sabia</h1>
    </div>
    <ul class="nav-links">
        <li *ngFor="let item of navItems">
            <a [routerLink]="item.path" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                [appTooltip]="item.tooltip">
                {{ item.label }}
            </a>
        </li>
    </ul>

    <div class="user-actions" *ngIf="authService.currentUser$ | async as user">
        <span class="user-name" [appTooltip]="user.roles.join(', ')">{{ user.name }}</span>
        <button class="zen-btn secondary small" (click)="logout()" appTooltip="Cerrar sesión">Salir</button>
    </div>
</nav>
