<div class="contabilidad-layout fade-in">
    <!-- Sidebar Menú -->
    <div class="contabilidad-sidebar card">
        <h2>Módulo de Contabilidad</h2>
        <p style="color: var(--zen-text-secondary); margin-bottom: 20px;">Gestión de cuentas, asientos, mayores y reportes.</p>

        <div class="submenu-section">
            <h3>Gestión y Reportes</h3>
            <ul class="zen-list">
                <li><a (click)="abrirPlanCuentas()" appTooltip="Estructura jerárquica de cuentas">Plan de cuentas jerárquico</a></li>
                <li><a routerLink="asientos-contables" routerLinkActive="active" appTooltip="Registro de comprobantes y asientos">Registro de asientos contables</a></li>
                <li><a routerLink="libro-mayor" routerLinkActive="active" appTooltip="Consulta del libro diario y mayor">Libro mayor</a></li>
                <li><a routerLink="balance-general" routerLinkActive="active" appTooltip="Balance de sumas y saldos">Balance general</a></li>
                <li><a routerLink="estado-resultados" routerLinkActive="active" appTooltip="Estado de resultados y reportes">Estado de resultados</a></li>
                <li><a routerLink="periodos-contables" routerLinkActive="active" appTooltip="Gestión del ejercicio económico">Períodos contables</a></li>
            </ul>
        </div>
    </div>

    <!-- Área de Trabajo Principal -->
    <div class="contabilidad-content">
        <router-outlet></router-outlet>
    </div>
</div>

<!-- Modal Overlay for Plan de Cuentas -->
<app-plan-cuentas *ngIf="isPlanCuentasOpen" (closeWindow)="cerrarPlanCuentas()"></app-plan-cuentas>
