<div class="container">
    <div class="card">
        <h2>Módulo de Ventas</h2>
        <p>Gestión de facturación, clientes y pedidos.</p>

        <div *ngIf="loading$ | async" class="loading-state">
            <p>Cargando datos del estado centralizado...</p>
        </div>

        <div *ngIf="(clientes$ | async) as clientes" class="store-preview">
            <h3>Vista previa de Clientes (NgRx Store)</h3>
            <ul class="zen-list">
                <li *ngFor="let cliente of clientes">{{ cliente.name }}</li>
            </ul>
        </div>

        <div class="submenu-section">
            <h3>Archivos Generales</h3>
            <ul class="zen-list">
                <li><a routerLink="clientes">Clientes</a></li>
                <li><a routerLink="productos">Productos</a></li>
                <li><a routerLink="vendedores">Vendedores</a></li>
                <li><a routerLink="zonas">Zonas</a></li>
                <li><a routerLink="lista-precios">Lista de Precios</a></li>
            </ul>
        </div>
    </div>
    <router-outlet></router-outlet>
</div>
