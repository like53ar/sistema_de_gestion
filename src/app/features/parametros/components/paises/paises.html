<div class="card zen-form-card fade-in" style="margin-top: 20px;">
    <div class="header-actions">
        <div>
            <h3>Administración de Países</h3>
            <p>Padrón oficial de países para comercio e identificación.</p>
        </div>
        <div class="search-box">
            <input type="text" class="zen-input" placeholder="Buscar por código o nombre..." [(ngModel)]="searchTerm">
        </div>
    </div>


    <div class="table-container">
        <table class="zen-table">
            <thead>
                <tr>
                    <th style="width: 15%;">Código de País</th>
                    <th style="width: 85%;">Nombre del País</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let p of paisesFiltrados">
                    <td><span class="badge">{{ p.id }}</span></td>
                    <td>{{ p.nombre }}</td>
                </tr>
                <tr *ngIf="paisesFiltrados.length === 0">
                    <td colspan="2" class="text-center">No se encontraron países con ese criterio.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
